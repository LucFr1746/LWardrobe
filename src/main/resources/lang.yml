#-------------------------------------------------
#                  Wardrobe Lang                 -
#-------------------------------------------------
#           Supported Hex color (1.16+)          -
#                                                -
#  #hexcolor to use that color (ex: "#80FFDBThis is hex text.")
#  <gradient>StartHex-EndHex-text<gradient> (ex: <gradient>#B38182-#352627-This is gradient text.<gradient>)

Plugin-Prefix: "&a[Wardrobe] "

Permission-Denied: "&cYou do not have permission to perform this command."
Unknown-Command: '&fUnknown command. Type "/help" for help.'
Disable: "&cWe're sorry that Wardrobe is currently disable."
Page-Not-Exists: "&cThat page does not exists!"
Slot-Not-Exists: "&cThat slot does not exists!"
Player-Not-Found: "&cCan not find that player!"
Denied-Modify-Armor: "&cYou can not modify your equipped armor set!"
No-Space: "&cYou don't have enough space in your inventory!"
Open-GUI-Error: "&cNo player was found or that page does not exists!"
Success-Open-GUI: "&aSuccess open Wardrobe for %wardrobe_success_player_list%."
Unsuccessful-Open-GUI: "&cCan not find players named: %wardrobe_unsuccessful_player_list%."
Player-Require: "&cPlease enter a player name!"
Number-Require: "&cPlease enter a number!"
Player-To-Open-Require: "&CPlease enter a player name to open for!"
Error: "&cSomething when wrong, please contact to the developer!"
Error-At-Command-Section: "&cUnknown command at -> %error%"
Success-Reset-Player: "&aSuccess reset %player_name%'s Wardrobe %work% %number%"
Confirm: "&cPlease type '/wardrobe reset yes' to confirm."
Command-Executor-Denied: "&cThis command just can be executed by player!"
Checking: "&cAn admin is checking your wardrobe right now!"
#-------------------GUI-Items---------------------

Locked-Slot:
  Name: "&7Slot %Slot%: &cLocked"
  Lore:
    - "&7This wardrobe slot is locked and"
    - "&7cannot be used."
    - ""
    - "&cRequires %Permission_Require_Prefix%"
Available-Slot:
  #leave to (none) to disable the text
  #Name: none (to set item name to null)
  Helmet:
    Name: "&aSlot %Slot% Helmet"
    Lore:
      - "&7Place a helmet here to add it"
      - "&7to the armor set."
  Chestplate:
    Name: "&aSlot %Slot% Chestplate"
    Lore:
      - "&7Place a chestplate here to add"
      - "&7it to the armor set."
  Leggings:
    Name: "&aSlot %Slot% Leggings"
    Lore:
      - "&7Place a pair of leggings here"
      - "&7to add them to the armor"
  Boots:
    Name: "&aSlot %Slot% Boots"
    Lore:
      - "&7Place a pair of boots here to"
      - "&7add them to the armor set."
Button:
  Close:
    Enable: true
    Slot: 49
    Name: "&cClose"
    Lore: none
  Go-Back:
    Enable: false
    Command: help
    Slot: 48
    Name: "&aGo Back"
    Lore:
      - "&7To SkyBlock Menu"
  Next-Page:
    Slot: 53
    Name: "&aNext Page"
    Lore:
      - "&ePage %Next_Page%"
  Previous-Page:
    Slot: 45
    Name: "&aPrevious Page"
    Lore:
      - "&ePage %Previous_Page%"
  Empty:
    Name: "&7Slot %Slot%: &cEmpty"
    Lore:
      - "&7This wardrobe slot contains no"
      - "&7armor."
  Ready:
    Name: "&7Slot %Slot%: &aReady"
    Lore:
      - "&7This wardrobe slot is ready to"
      - "&7be equipped."
      - ""
      - "&eClick to equip this armor set"
  Equipped:
    Name: "&7Slot %Slot%: &aEquipped"
    Lore:
      - "&7This wardrobe slot contains your"
      - "&7current armor set."
      - ""
      - "&eClick to unequip this armor set"
  Locked:
    Name: "&7Slot %Slot%: &cLocked"
    Lore:
      - "&7This wardrobe slot is locked and"
      - "&7cannot be used."
      - ""
      - "&cRequires %Permission_Require_Prefix%"
  Delete:
    Name: "&7Slot %Slot%: &aClick to delete this slot."
    Lore:
      - "&7Click this button to clear"
      - "&7this player slot."
